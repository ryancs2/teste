<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tabela de Tarefas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      margin: 20px;
    }

    h1 {
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #333;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    .concluido {
      color: green;
      font-weight: bold;
    }

    .andamento {
      color: orange;
      font-weight: bold;
    }

    .pendente {
      color: red;
      font-weight: bold;
    }

    a {
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <h1>Bem-vindo, Ana</h1>

  <p>
    <a href="{% url 'tarefas:home' %}">Home</a>
    <a href="{% url 'tarefas:adicionar' %}">Adicionar </a>
  </p>

  <h2>Lista de Tarefas</h2>

<table>
  <tr>
    <th>Assunto</th>
    <th>Descrição</th>
    <th>Data</th>
    <th>Status</th>
    <th>Ações</th>
  </tr>
  {% for tarefa in tarefas %}
  <tr>
    <td>{{ tarefa.assunto }}</td>
    <td>{{ tarefa.descricao }}</td>
    <td>{{ tarefa.data }}</td>
    <td class="{{ tarefa.status_classe }}">
    {% if tarefa.status %}Completo{% else %}Incompleto{% endif %}
    </td>
    <td>
      <a href="{% url 'tarefas:editar' id=tarefa.id %}">Editar</a>
      <a href="{% url 'tarefas:remover' id=tarefa.id %}">Remover</a>
    </td>
  </tr>
  {% endfor %}
</table>

</body>
</html>
